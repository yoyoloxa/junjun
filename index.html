<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>均均文理補習班點名系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeecea;
    --text: #1a1a18; --text2: #6b6a66; --text3: #9b9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #2a2a27; --bg3: #333330;
      --text: #f0ede8; --text2: #a09e9a; --text3: #6b6a66;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; background: var(--bg); min-height: 100vh; box-shadow: 0 0 0 0.5px var(--border); }

  .header { padding: 1.25rem 1.25rem 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .title-block h1 { font-size: 20px; font-weight: 500; }
  .title-block p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .date-badge { font-size: 13px; font-weight: 500; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 12px; white-space: nowrap; }
  .sync-badge { font-size: 12px; padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border); white-space: nowrap; }
  .sync-badge.online  { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
  .sync-badge.offline { background: #FAECE7; color: #712B13; border-color: #D85A30; }
  .sync-badge.syncing { background: #FAEEDA; color: #633806; border-color: #EF9F27; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 1rem 1.25rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
  .stat-num { font-size: 22px; font-weight: 500; }
  .stat-num.present { color: #0F6E56; }
  .stat-num.absent  { color: #993C1D; }
  .stat-num.leave   { color: #854F0B; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .toolbar { display: flex; align-items: center; gap: 8px; padding: 0 1.25rem 0.75rem; flex-wrap: wrap; }
  input[type=text] { background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 10px; font-size: 14px; outline: none; }
  input[type=text]:focus { border-color: #1D9E75; }
  .btn { border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); border-radius: var(--radius); padding: 7px 14px; font-size: 13px; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--bg2); }
  .btn-add    { background: #E1F5EE; border-color: #5DCAA5; color: #085041; font-weight: 500; }
  .btn-add:hover { background: #9FE1CB; }
  .btn-import { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; font-weight: 500; }
  .btn-import:hover { background: #B5D4F4; }

  .filter-tabs { display: flex; gap: 4px; padding: 0 1.25rem 0.5rem; flex-wrap: wrap; }
  .ftab { font-size: 13px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.12s; }
  .ftab.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }

  .table-wrap { padding: 0 1.25rem 2rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 12px; font-weight: 500; color: var(--text2); padding: 6px 8px; text-align: left; border-bottom: 0.5px solid var(--border2); }
  td { font-size: 14px; padding: 8px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }

  .status-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .sb { padding: 4px 10px; font-size: 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); transition: all 0.1s; flex: 1; min-width: 50px; text-align: center; }
  .sb:hover { background: var(--bg2); }
  .sb.active-present { background: #22c55e; color: white; border-color: #22c55e; font-weight: 500; }
  .sb.active-absent  { background: #ef4444; color: white; border-color: #ef4444; font-weight: 500; }
  .sb.active-leave   { background: #f59e0b; color: white; border-color: #f59e0b; font-weight: 500; }

  .note-input { width: 100%; border: 0.5px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px; color: var(--text); background: var(--bg); }
  .note-input:focus { outline: none; border-color: var(--border2); background: var(--bg2); }
  .del-btn { color: var(--text2); font-size: 14px; background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
  .del-btn:hover { background: #FAECE7; color: #712B13; }
  .empty { text-align: center; color: var(--text2); font-size: 14px; padding: 2.5rem 0; }

  /* Loading & Modals */
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); width: 100%; max-width: 520px; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .modal-tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .mtab { font-size: 13px; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .mtab.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 2rem; text-align: center; cursor: pointer; }
  .upload-zone:hover, .upload-zone.drag { background: var(--bg2); }
  #file-input { display: none; }
  .col-map { margin-top: 1rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 13px; color: var(--text2); }
  .col-map select { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px; outline: none; }
  .preview-wrap { overflow-x: auto; margin-top: 0.75rem; }
  .preview-table { border-collapse: collapse; font-size: 13px; width: 100%; }
  .preview-table th, .preview-table td { padding: 4px 10px; border-bottom: 0.5px solid var(--border); text-align: left; }
  textarea { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px; min-height: 140px; outline: none; font-family: inherit; }

  @media (max-width: 520px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .status-btns { flex-direction: column; }
    .sb { width: 100%; padding: 10px 0; }
  }
  @media print {
    .toolbar, .filter-tabs, .del-btn, .sb, .note-input, .modal-backdrop, .loading-overlay { display: none !important; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>連線雲端資料庫中...</p>
</div>

<div class="app">
  <div class="header">
    <div class="title-block">
      <h1>均均點名系統</h1>
      <p>今日點名名單</p>
    </div>
    <div class="header-right">
      <div class="date-badge" id="date-badge"></div>
      <div class="sync-badge syncing" id="sync-badge">⏳ 連線中...</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">總人數</div></div>
    <div class="stat"><div class="stat-num present" id="present-count">0</div><div class="stat-label">到班</div></div>
    <div class="stat"><div class="stat-num absent"  id="absent-count">0</div><div class="stat-label">缺席</div></div>
    <div class="stat"><div class="stat-num leave"   id="leave-count">0</div><div class="stat-label">請假</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="搜尋姓名或備註..." style="width:180px;" />
    <input type="text" id="add-name"  placeholder="輸入學生姓名" style="width:200px;" />
    <button class="btn btn-add" onclick="addStudent()">＋ 新增學生</button>
    <button class="btn btn-import" onclick="openImport()">📋 匯入名單</button>
    <button class="btn" onclick="markAll('present')">全部到班</button>
    <button class="btn" onclick="resetAll()">清除點名</button>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button>
    <button class="btn" onclick="window.print()">列印</button>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">全部</button>
    <button class="ftab" onclick="setFilter('present',this)">到班</button>
    <button class="ftab" onclick="setFilter('absent',this)">缺席</button>
    <button class="ftab" onclick="setFilter('leave',this)">請假</button>
    <button class="ftab" onclick="setFilter('none',this)">未點名</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px;">#</th>
          <th style="width:120px;">姓名</th>
          <th style="width:200px;">出席狀態</th>
          <th style="width:180px;">備註</th>
          <th style="width:36px;"></th>
        </tr>
      </thead>
      <tbody id="student-tbody"></tbody>
    </table>
    <div id="empty-msg" class="empty" style="display:none;">目前沒有學生，請新增或匯入名單</div>
  </div>
</div>

<div class="modal-backdrop" id="import-modal" onclick="closeImportOutside(event)">
  <div class="modal">
    <h2>匯入學生名單</h2>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchMTab('tab-file',this)">上傳 Excel / CSV</button>
      <button class="mtab" onclick="switchMTab('tab-paste',this)">貼上文字</button>
    </div>
    <div id="tab-file" class="tab-panel active">
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
        <div style="font-size:28px;">📂</div>
        <p>點擊或拖曳檔案到此處</p>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFileInput(event)" />
      <div id="col-map-area" style="display:none;">
        <div class="col-map">
          <span>姓名欄位：</span><select id="col-name" onchange="buildPreview()"></select>
          <span style="margin-left:8px;">原班級欄位(選填)：</span><select id="col-class" onchange="buildPreview()"></select>
        </div>
        <div class="preview-wrap"><table class="preview-table" id="preview-table"></table></div>
      </div>
    </div>
    <div id="tab-paste" class="tab-panel">
      <p class="paste-hint">每行一位學生，格式：<code>姓名</code> 或 <code>姓名,備註</code></p>
      <textarea id="paste-area" placeholder="王小明&#10;林佳慧,週一數學班&#10;陳建宇,週二英文班"></textarea>
    </div>
    <div class="modal-footer" style="display:flex; gap:8px; justify-content:flex-end; margin-top:1rem;">
      <label style="font-size:13px; margin-right:auto; cursor:pointer;"><input type="checkbox" id="chk-replace" /> 取代現有名單</label>
      <button class="btn" onclick="closeImport()">取消</button>
      <button class="btn btn-add" onclick="doImport()">確認匯入</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCIJ9hrRWaD_s26eAZrpAUbpZbdrZ2fm0",
  authDomain: "ankinder-34783.firebaseapp.com",
  databaseURL: "https://ankinder-34783-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ankinder-34783",
  storageBucket: "ankinder-34783.firebasestorage.app",
  messagingSenderId: "287380680956",
  appId: "1:287380680956:web:45c6b822422db8a12fe779",
  measurementId: "G-W5TD1ZE6VH"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const studentsRef = ref(db, 'students');

let students = {};
let filterStatus = 'all', searchQ = '';
let parsedFileRows = [], fileHeaders = [];

function setSyncBadge(state) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-badge ' + state;
  b.textContent = state === 'online' ? '☁️ 已同步' : state === 'syncing' ? '⏳ 同步中...' : '❌ 離線';
}

onValue(studentsRef, (snapshot) => {
  students = snapshot.val() || {};
  setSyncBadge('online');
  document.getElementById('loading').style.display = 'none';
  updateStats(); render();
});

window._fbUpdate = async (path, data) => { setSyncBadge('syncing'); await update(ref(db, path), data); };
window._fbRemove = async (path) => { setSyncBadge('syncing'); await remove(ref(db, path)); };
window._fbPush = async (path, data) => { setSyncBadge('syncing'); return await push(ref(db, path), data); };

window.setStatus = async (key, status) => { await window._fbUpdate('students/'+key, { status }); };
window.setNote   = async (key, note)   => { await window._fbUpdate('students/'+key, { note }); };

window.addStudent = async () => {
  const nameEl = document.getElementById('add-name');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  await window._fbPush('students', { name, status:'none', note:'' });
  nameEl.value = '';
};

window.deleteStudent = async (key) => {
  if (!confirm('確定刪除？')) return;
  await window._fbRemove('students/'+key);
};

window.markAll = async (status) => {
  const updates = {};
  Object.keys(students).forEach(k => { updates['students/'+k+'/status'] = status; });
  await update(ref(db), updates);
};

window.resetAll = async () => {
  if (!confirm('確定清除今日所有點名紀錄？')) return;
  const updates = {};
  Object.keys(students).forEach(k => {
    updates['students/'+k+'/status'] = 'none';
    updates['students/'+k+'/note'] = '';
  });
  await update(ref(db), updates);
};

window.doImport = async () => {
  const replace = document.getElementById('chk-replace').checked;
  const activeTab = document.querySelector('.tab-panel.active').id;
  let newItems = [];

  if (activeTab === 'tab-file') {
    const ni = document.getElementById('col-name').value;
    const ci = document.getElementById('col-class').value;
    if (ni === '') { alert('請選擇姓名欄位'); return; }
    newItems = parsedFileRows.map(r => {
        let note = '';
        if (ci !== '' && r[ci]) note = `(${r[ci]})`;
        return { name: String(r[ni]||'').trim(), note: note };
    }).filter(s => s.name);
  } else {
    const lines = document.getElementById('paste-area').value.split(/\r?\n/).filter(l=>l.trim());
    newItems = lines.map(l => {
      const p = l.split(/[,，\t]/);
      return { name: p[0].trim(), note: (p[1]||'').trim() };
    }).filter(s => s.name);
  }

  if (replace) await set(ref(db, 'students'), null);
  for (const s of newItems) await window._fbPush('students', { ...s, status:'none' });
  closeImport();
};

window.updateStats = function() {
  const arr = Object.values(students);
  document.getElementById('total-count').textContent = arr.length;
  document.getElementById('present-count').textContent = arr.filter(s=>s.status==='present').length;
  document.getElementById('absent-count').textContent = arr.filter(s=>s.status==='absent').length;
  document.getElementById('leave-count').textContent = arr.filter(s=>s.status==='leave').length;
};

window.render = function() {
  let list = Object.entries(students).map(([k,v])=>({key:k,...v}));
  if (searchQ) {
    list = list.filter(s => s.name.includes(searchQ) || (s.note && s.note.includes(searchQ)));
  }
  if (filterStatus !== 'all') list = list.filter(s=>s.status===filterStatus);
  
  const tbody = document.getElementById('student-tbody');
  const empty = document.getElementById('empty-msg');
  tbody.innerHTML = '';
  
  if (!list.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  
  tbody.innerHTML = list.map((s,i)=>`<tr>
    <td style="color:var(--text2);font-size:12px;">${i+1}</td>
    <td style="font-weight:600;">${s.name}</td>
    <td><div class="status-btns">
      <button class="sb ${s.status==='present'?'active-present':''}" onclick="setStatus('${s.key}','present')">到班</button>
      <button class="sb ${s.status==='absent'?'active-absent':''}"  onclick="setStatus('${s.key}','absent')">缺席</button>
      <button class="sb ${s.status==='leave'?'active-leave':''}"    onclick="setStatus('${s.key}','leave')">請假</button>
    </div></td>
    <td><input class="note-input" type="text" placeholder="輸入備註..." value="${(s.note||'').replace(/"/g,'&quot;')}" onchange="setNote('${s.key}',this.value)" /></td>
    <td><button class="del-btn" onclick="deleteStudent('${s.key}')">✕</button></td>
  </tr>`).join('');
};

window.setFilter = function(f,el) {
  filterStatus=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); render();
};

document.getElementById('add-name').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent();});
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value.trim();render();});

const d=new Date(), days=['日','一','二','三','四','五','六'];
document.getElementById('date-badge').textContent = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（週'+days[d.getDay()]+'）';

window.exportCSV = function() {
  let csv='\uFEFF姓名,狀態,備註\n';
  Object.values(students).forEach(s=>{
    const statusText = s.status==='present'?'到班':s.status==='absent'?'缺席':s.status==='leave'?'請假':'未點名';
    csv+=`${s.name},${statusText},"${s.note||''}"\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`點名紀錄_${d.getMonth()+1}月${d.getDate()}日.csv`; a.click();
};

// Import Logic
window.openImport = function(){ document.getElementById('import-modal').classList.add('open'); };
window.closeImport = function(){ document.getElementById('import-modal').classList.remove('open'); };
window.switchMTab = function(id,el){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active'); el.classList.add('active');
};
window.handleFileInput = function(e){ const f=e.target.files[0]; if(f) parseFile(f); };
window.handleDrop = function(e){ e.preventDefault(); parseFile(e.dataTransfer.files[0]); };

function parseFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    let rows=[];
    if(file.name.endsWith('.csv')){
      rows=e.target.result.split('\n').map(l=>l.split(','));
    } else {
      const wb=XLSX.read(e.target.result,{type:'array'});
      rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
    }
    fileHeaders=rows[0];
    parsedFileRows=rows.slice(1);
    buildColMap();
    document.getElementById('col-map-area').style.display='block';
  };
  reader.readAsArrayBuffer(file);
}

function buildColMap(){
  const selN=document.getElementById('col-name'), selC=document.getElementById('col-class');
  selN.innerHTML='<option value="">(請選擇)</option>';
  selC.innerHTML='<option value="">(無)</option>';
  fileHeaders.forEach((h,i)=>{
    const opt=`<option value="${i}">${h}</option>`;
    selN.innerHTML+=opt; selC.innerHTML+=opt;
  });
}

window.buildPreview = function(){
  const ni=document.getElementById('col-name').value, ci=document.getElementById('col-class').value;
  let html='<tr><th>姓名</th><th>預覽備註</th></tr>';
  parsedFileRows.slice(0,3).forEach(r=>{
    html+=`<tr><td>${r[ni]||''}</td><td>${ci!==''?r[ci]:''}</td></tr>`;
  });
  document.getElementById('preview-table').innerHTML=html;
};
</script>
</body>
</html>
