<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>均均接送點名</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0;
    --text: #1a1a18; --text2: #6b6a66;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #2a2a27;
      --text: #f0ede8; --text2: #a09e9a;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: -apple-system, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 600px; margin: 0 auto; background: var(--bg); min-height: 100vh; box-shadow: 0 0 0 0.5px var(--border); }

  .header { padding: 1.5rem 1.5rem 1rem; }
  .search-zone { padding: 0 1.5rem 1rem; display: flex; gap: 6px; }
  .search-input-wrap { flex: 1; position: relative; }
  #search-input { width: 100%; padding: 15px; font-size: 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); }
  .clear-search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #ddd; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 0 1.5rem 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px; text-align: center; }
  
  .toolbar { padding: 0 1.5rem 1.5rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border2); background: white; cursor: pointer; font-size: 14px; }
  .btn-add { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
  .btn-reset { color: #993C1D; font-weight: 600; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; }
  td { padding: 18px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .name-td { font-size: 22px; font-weight: 800; }
  
  /* 刪除按鈕樣式 */
  .del-btn { color: #ccc; border: none; background: none; font-size: 18px; cursor: pointer; padding: 5px; margin-left: 8px; }
  .del-btn:hover { color: #ef4444; }

  .status-btns { display: flex; gap: 6px; }
  .sb { flex: 1; padding: 15px 0; border-radius: 10px; border: 1px solid var(--border); font-size: 15px; font-weight: bold; background: #fff; color: var(--text2); }
  .sb.active-present { background: #22c55e; color: white; border-color: #22c55e; }
  .sb.active-absent  { background: #ef4444; color: white; border-color: #ef4444; }
  .sb.active-leave   { background: #f59e0b; color: white; border-color: #f59e0b; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 99; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading"><div>⏳ 載入名單中...</div></div>

<div class="app">
  <div class="header">
    <h1 style="font-size: 24px;">均均接送點名</h1>
    <div id="date-badge" style="font-size: 14px; color: gray; margin-top: 4px;"></div>
  </div>

  <div class="search-zone">
    <div class="search-input-wrap">
      <input type="text" id="search-input" placeholder="搜尋姓名..." autofocus>
      <button class="clear-search-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div id="total-count" style="font-weight:bold">0</div><div style="font-size:11px">總數</div></div>
    <div class="stat"><div id="present-count" style="color:#22c55e; font-weight:bold">0</div><div style="font-size:11px">接到</div></div>
    <div class="stat"><div id="absent-count" style="color:#ef4444; font-weight:bold">0</div><div style="font-size:11px">缺席</div></div>
    <div class="stat"><div id="leave-count" style="color:#f59e0b; font-weight:bold">0</div><div style="font-size:11px">請假</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="add-name" placeholder="快速加人..." style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border2); font-size:16px;">
    <button class="btn btn-add" onclick="addStudent()">新增</button>
    <button class="btn btn-reset" onclick="resetToday()">重置點名</button>
  </div>

  <table>
    <tbody id="student-tbody"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCIJ9hrRWaD_s26eAZrpAUbpZbdrZ2fm0",
  authDomain: "ankinder-34783.firebaseapp.com",
  databaseURL: "https://ankinder-34783-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ankinder-34783",
  storageBucket: "ankinder-34783.firebasestorage.app",
  messagingSenderId: "287380680956",
  appId: "1:287380680956:web:45c6b822422db8a12fe779",
  measurementId: "G-W5TD1ZE6VH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const studentsRef = ref(db, 'students');

let students = {};
let searchQ = '';

onValue(studentsRef, (snapshot) => {
  students = snapshot.val() || {};
  document.getElementById('loading').style.display = 'none';
  updateStats(); render();
});

window.setStatus = async (key, status) => {
  await update(ref(db, 'students/' + key), { status });
};

window.addStudent = async () => {
  const el = document.getElementById('add-name');
  const name = el.value.trim();
  if (!name) return;
  await push(ref(db, 'students'), { name, status: 'none', note: '' });
  el.value = '';
};

// 刪除學生的函式
window.deleteStudent = async (key, name) => {
  if (confirm(`確定要從名單中刪除「${name}」嗎？`)) {
    await remove(ref(db, 'students/' + key));
  }
};

window.resetToday = async () => {
  if (!confirm('確定要將所有點名狀態重置嗎？')) return;
  const updates = {};
  Object.keys(students).forEach(key => {
    updates['students/' + key + '/status'] = 'none';
  });
  await update(ref(db), updates);
};

window.clearSearch = () => {
  const input = document.getElementById('search-input');
  input.value = '';
  searchQ = '';
  render();
};

window.render = function() {
  const tbody = document.getElementById('student-tbody');
  let list = Object.entries(students).map(([k,v]) => ({key:k, ...v}));
  if (searchQ) list = list.filter(s => s.name.includes(searchQ));

  tbody.innerHTML = list.map(s => `
    <tr>
      <td class="name-td">
        ${s.name}
        <button class="del-btn" onclick="deleteStudent('${s.key}', '${s.name}')" title="刪除學生">✕</button>
      </td>
      <td>
        <div class="status-btns">
          <button class="sb ${s.status==='present'?'active-present':''}" onclick="setStatus('${s.key}','present')">接到</button>
          <button class="sb ${s.status==='absent'?'active-absent':''}" onclick="setStatus('${s.key}','absent')">缺席</button>
          <button class="sb ${s.status==='leave'?'active-leave':''}" onclick="setStatus('${s.key}','leave')">請假</button>
        </div>
      </td>
    </tr>
  `).join('');
};

window.updateStats = () => {
  const vals = Object.values(students);
  document.getElementById('total-count').textContent = vals.length;
  document.getElementById('present-count').textContent = vals.filter(v=>v.status==='present').length;
  document.getElementById('absent-count').textContent = vals.filter(v=>v.status==='absent').length;
  document.getElementById('leave-count').textContent = vals.filter(v=>v.status==='leave').length;
};

document.getElementById('search-input').addEventListener('input', (e) => {
  searchQ = e.target.value.trim();
  render();
});

const d = new Date();
document.getElementById('date-badge').textContent = `${d.getMonth()+1}/${d.getDate()} 點名表`;
</script>
</body>
</html>
