<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安親班點名系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeecea;
    --text: #1a1a18; --text2: #6b6a66; --text3: #9b9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #2a2a27; --bg3: #333330;
      --text: #f0ede8; --text2: #a09e9a; --text3: #6b6a66;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; background: var(--bg); min-height: 100vh; box-shadow: 0 0 0 0.5px var(--border); }

  .header { padding: 1.25rem 1.25rem 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .title-block h1 { font-size: 20px; font-weight: 500; }
  .title-block p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .date-badge { font-size: 13px; font-weight: 500; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 12px; white-space: nowrap; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 1rem 1.25rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
  .stat-num { font-size: 22px; font-weight: 500; }
  .stat-num.present { color: #0F6E56; }
  .stat-num.absent { color: #993C1D; }
  .stat-num.leave { color: #854F0B; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .toolbar { display: flex; align-items: center; gap: 8px; padding: 0 1.25rem 0.75rem; flex-wrap: wrap; }
  input[type=text] { background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 7px 10px; font-size: 14px; outline: none; }
  input[type=text]:focus { border-color: #1D9E75; }
  .btn { border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); border-radius: var(--radius); padding: 7px 14px; font-size: 13px; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
  .btn:hover { background: var(--bg2); }
  .btn-add { background: #E1F5EE; border-color: #5DCAA5; color: #085041; font-weight: 500; }
  .btn-add:hover { background: #9FE1CB; }
  .btn-import { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; font-weight: 500; }
  .btn-import:hover { background: #B5D4F4; }

  .filter-tabs { display: flex; gap: 4px; padding: 0 1.25rem 0.5rem; flex-wrap: wrap; }
  .ftab { font-size: 13px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.12s; }
  .ftab.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }

  .table-wrap { padding: 0 1.25rem 2rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { font-size: 12px; font-weight: 500; color: var(--text2); padding: 6px 8px; text-align: left; border-bottom: 0.5px solid var(--border2); }
  td { font-size: 14px; padding: 8px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }

  .status-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .sb { padding: 4px 10px; font-size: 12px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text2); transition: all 0.1s; }
  .sb:hover { background: var(--bg2); }
  .sb.active-present { background: #E1F5EE; color: #085041; border-color: #5DCAA5; font-weight: 500; }
  .sb.active-absent { background: #FAECE7; color: #712B13; border-color: #D85A30; font-weight: 500; }
  .sb.active-leave { background: #FAEEDA; color: #633806; border-color: #EF9F27; font-weight: 500; }

  .note-input { width: 100%; border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; color: var(--text); background: var(--bg); }
  .note-input:focus { outline: none; border-color: var(--border2); }
  .del-btn { color: var(--text2); font-size: 14px; background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
  .del-btn:hover { background: #FAECE7; color: #712B13; }
  .empty { text-align: center; color: var(--text2); font-size: 14px; padding: 2.5rem 0; }

  /* Modal */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); width: 100%; max-width: 520px; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .modal-tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .mtab { font-size: 13px; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; }
  .mtab.active { background: var(--bg2); color: var(--text); border-color: var(--border2); font-weight: 500; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 2rem; text-align: center; cursor: pointer; transition: background 0.12s; }
  .upload-zone:hover, .upload-zone.drag { background: var(--bg2); }
  .upload-zone p { font-size: 14px; color: var(--text2); margin-top: 8px; }
  .upload-zone small { font-size: 12px; color: var(--text3); }
  #file-input { display: none; }

  .col-map { margin-top: 1rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 13px; color: var(--text2); }
  .col-map select { background: var(--bg); color: var(--text); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 8px; font-size: 13px; outline: none; }
  .preview-wrap { overflow-x: auto; margin-top: 0.75rem; }
  .preview-table { border-collapse: collapse; font-size: 13px; min-width: 200px; }
  .preview-table th, .preview-table td { padding: 4px 10px; border-bottom: 0.5px solid var(--border); text-align: left; }
  .preview-table th { color: var(--text2); font-weight: 500; }
  .import-result { font-size: 13px; margin-top: 8px; color: #0F6E56; }

  .paste-hint { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .paste-hint code { background: var(--bg2); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  textarea { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px; font-size: 14px; color: var(--text); background: var(--bg); resize: vertical; min-height: 140px; outline: none; font-family: inherit; }
  textarea:focus { border-color: #1D9E75; }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; align-items: center; }

  @media (max-width: 520px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
  @media print {
    .toolbar, .filter-tabs, .del-btn, .sb, .note-input, .modal-backdrop { display: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-block">
      <h1>安親班點名系統</h1>
      <p>快樂學習安親班</p>
    </div>
    <div class="date-badge" id="date-badge"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">總人數</div></div>
    <div class="stat"><div class="stat-num present" id="present-count">0</div><div class="stat-label">到班</div></div>
    <div class="stat"><div class="stat-num absent" id="absent-count">0</div><div class="stat-label">缺席</div></div>
    <div class="stat"><div class="stat-num leave" id="leave-count">0</div><div class="stat-label">請假</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search-input" placeholder="搜尋姓名或班級..." style="width:160px;" />
    <input type="text" id="add-name" placeholder="新增學生姓名" style="width:130px;" />
    <input type="text" id="add-class" placeholder="班級（如：三甲）" style="width:120px;" />
    <button class="btn btn-add" onclick="addStudent()">＋ 新增</button>
    <button class="btn btn-import" onclick="openImport()">📋 匯入名單</button>
    <button class="btn" onclick="markAll('present')">全部到班</button>
    <button class="btn" onclick="resetAll()">清除點名</button>
    <button class="btn" onclick="exportCSV()">匯出 CSV</button>
    <button class="btn" onclick="window.print()">列印</button>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">全部</button>
    <button class="ftab" onclick="setFilter('present',this)">到班</button>
    <button class="ftab" onclick="setFilter('absent',this)">缺席</button>
    <button class="ftab" onclick="setFilter('leave',this)">請假</button>
    <button class="ftab" onclick="setFilter('none',this)">未點名</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px;">#</th>
          <th style="width:80px;">姓名</th>
          <th style="width:70px;">班級</th>
          <th style="width:190px;">出席狀態</th>
          <th style="width:150px;">備註</th>
          <th style="width:36px;"></th>
        </tr>
      </thead>
      <tbody id="student-tbody"></tbody>
    </table>
    <div id="empty-msg" class="empty" style="display:none;">目前沒有學生，請新增或匯入名單</div>
  </div>
</div>

<!-- 匯入 Modal -->
<div class="modal-backdrop" id="import-modal" onclick="closeImportOutside(event)">
  <div class="modal">
    <h2>匯入學生名單</h2>
    <div class="modal-tabs">
      <button class="mtab active" onclick="switchMTab('tab-file',this)">上傳 Excel / CSV</button>
      <button class="mtab" onclick="switchMTab('tab-paste',this)">貼上文字</button>
    </div>

    <div id="tab-file" class="tab-panel active">
      <div class="upload-zone" id="upload-zone"
           onclick="document.getElementById('file-input').click()"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="handleDrop(event)">
        <div style="font-size:28px;">📂</div>
        <p>點擊或拖曳檔案到此處</p>
        <small>支援 .xlsx、.xls、.csv 格式</small>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFileInput(event)" />
      <div id="col-map-area" style="display:none;">
        <div class="col-map">
          <span>姓名欄位：</span><select id="col-name" onchange="buildPreview()"></select>
          <span style="margin-left:8px;">班級欄位：</span><select id="col-class" onchange="buildPreview()"></select>
        </div>
        <div class="preview-wrap">
          <table class="preview-table" id="preview-table"></table>
        </div>
        <div class="import-result" id="file-result"></div>
      </div>
    </div>

    <div id="tab-paste" class="tab-panel">
      <p class="paste-hint">每行一位學生，格式：<code>姓名</code> 或 <code>姓名,班級</code></p>
      <p class="paste-hint" style="margin-bottom:10px;">範例：<code>王小明,三甲</code> 或只輸入 <code>王小明</code></p>
      <textarea id="paste-area" placeholder="王小明,三甲&#10;林佳慧,三甲&#10;陳建宇,三乙&#10;黃雅婷"></textarea>
      <div class="import-result" id="paste-result"></div>
    </div>

    <div class="modal-footer">
      <label style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;margin-right:auto;">
        <input type="checkbox" id="chk-replace" /> 取代現有名單
      </label>
      <button class="btn" onclick="closeImport()">取消</button>
      <button class="btn btn-add" onclick="doImport()">確認匯入</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'ankinder_v2';
const statusLabel = { none:'未點名', present:'到班', absent:'缺席', leave:'請假' };

let students = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || [
  {id:1,name:'王小明',cls:'三甲',status:'none',note:''},
  {id:2,name:'林佳慧',cls:'三甲',status:'none',note:''},
  {id:3,name:'陳建宇',cls:'三乙',status:'none',note:''},
  {id:4,name:'黃雅婷',cls:'四甲',status:'none',note:''},
  {id:5,name:'李承翰',cls:'四甲',status:'none',note:''},
  {id:6,name:'張宜芳',cls:'三乙',status:'none',note:''},
];
let nextId = students.length ? Math.max(...students.map(s=>s.id))+1 : 1;
let filterStatus='all', searchQ='';
let parsedFileRows=[], fileHeaders=[];

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(students)); }

function setDateBadge(){
  const d=new Date(), days=['日','一','二','三','四','五','六'];
  document.getElementById('date-badge').textContent =
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（週'+days[d.getDay()]+'）';
}
function updateStats(){
  document.getElementById('total-count').textContent=students.length;
  document.getElementById('present-count').textContent=students.filter(s=>s.status==='present').length;
  document.getElementById('absent-count').textContent=students.filter(s=>s.status==='absent').length;
  document.getElementById('leave-count').textContent=students.filter(s=>s.status==='leave').length;
}
function setFilter(f,el){
  filterStatus=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); render();
}
function setStatus(id,status){
  const s=students.find(s=>s.id===id);
  if(s){s.status=status;save();updateStats();render();}
}
function setNote(id,val){
  const s=students.find(s=>s.id===id);
  if(s){s.note=val;save();}
}
function addStudent(){
  const nameEl=document.getElementById('add-name'), clsEl=document.getElementById('add-class');
  const name=nameEl.value.trim(), cls=clsEl.value.trim()||'未分班';
  if(!name){nameEl.focus();return;}
  students.push({id:nextId++,name,cls,status:'none',note:''});
  nameEl.value='';clsEl.value='';
  save();updateStats();render();
}
function deleteStudent(id){
  if(!confirm('確定刪除這位學生？')) return;
  students=students.filter(s=>s.id!==id);
  save();updateStats();render();
}
function markAll(s){students.forEach(x=>x.status=s);save();updateStats();render();}
function resetAll(){
  if(!confirm('確定清除今日所有點名記錄？')) return;
  students.forEach(s=>{s.status='none';s.note='';});save();updateStats();render();
}
function exportCSV(){
  const d=new Date(), ds=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
  let csv='\uFEFF日期,姓名,班級,狀態,備註\n';
  students.forEach(s=>{csv+=`${ds},${s.name},${s.cls},${statusLabel[s.status]},"${s.note}"\n`;});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`點名記錄_${ds}.csv`; a.click();
}

document.getElementById('add-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-class').focus();});
document.getElementById('add-class').addEventListener('keydown',e=>{if(e.key==='Enter')addStudent();});
document.getElementById('search-input').addEventListener('input',function(){searchQ=this.value.trim();render();});

function render(){
  let list=students;
  if(searchQ) list=list.filter(s=>s.name.includes(searchQ)||s.cls.includes(searchQ));
  if(filterStatus!=='all') list=list.filter(s=>s.status===filterStatus);
  const tbody=document.getElementById('student-tbody'), empty=document.getElementById('empty-msg');
  if(!list.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=list.map((s,i)=>`<tr>
    <td style="color:var(--text2);font-size:13px;">${i+1}</td>
    <td style="font-weight:500;">${s.name}</td>
    <td style="font-size:13px;color:var(--text2);">${s.cls}</td>
    <td><div class="status-btns">
      <button class="sb ${s.status==='present'?'active-present':''}" onclick="setStatus(${s.id},'present')">到班</button>
      <button class="sb ${s.status==='absent'?'active-absent':''}" onclick="setStatus(${s.id},'absent')">缺席</button>
      <button class="sb ${s.status==='leave'?'active-leave':''}" onclick="setStatus(${s.id},'leave')">請假</button>
    </div></td>
    <td><input class="note-input" type="text" placeholder="備註..." value="${s.note.replace(/"/g,'&quot;')}" oninput="setNote(${s.id},this.value)" /></td>
    <td><button class="del-btn" onclick="deleteStudent(${s.id})">✕</button></td>
  </tr>`).join('');
}

/* ── Import Modal ── */
function openImport(){
  parsedFileRows=[];fileHeaders=[];
  document.getElementById('col-map-area').style.display='none';
  document.getElementById('file-input').value='';
  document.getElementById('paste-area').value='';
  document.getElementById('file-result').textContent='';
  document.getElementById('paste-result').textContent='';
  document.getElementById('chk-replace').checked=false;
  switchMTab('tab-file',document.querySelector('.mtab'));
  document.getElementById('import-modal').classList.add('open');
}
function closeImport(){ document.getElementById('import-modal').classList.remove('open'); }
function closeImportOutside(e){ if(e.target.id==='import-modal') closeImport(); }

function switchMTab(id,el){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const f=e.dataTransfer.files[0]; if(f) parseFile(f);
}
function handleFileInput(e){ const f=e.target.files[0]; if(f) parseFile(f); }

function parseFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    let rows=[];
    if(file.name.toLowerCase().endsWith('.csv')){
      const text=e.target.result;
      rows=text.split(/\r?\n/).filter(l=>l.trim()).map(l=>l.split(',').map(c=>c.replace(/^"|"$/g,'').trim()));
    } else {
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''}).filter(r=>r.some(c=>String(c).trim()));
    }
    if(!rows.length) return;
    fileHeaders=rows[0].map(String);
    parsedFileRows=rows.slice(1).filter(r=>r.some(c=>String(c).trim()));
    buildColMap();
    buildPreview();
    document.getElementById('col-map-area').style.display='block';
    document.getElementById('file-result').textContent='已讀取 '+parsedFileRows.length+' 筆資料';
  };
  if(file.name.toLowerCase().endsWith('.csv')) reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function buildColMap(){
  const sel=(id,guesses)=>{
    const s=document.getElementById(id); s.innerHTML='';
    const none=document.createElement('option'); none.value=''; none.textContent='（無）'; s.appendChild(none);
    fileHeaders.forEach((h,i)=>{
      const o=document.createElement('option'); o.value=i; o.textContent=h||'欄位'+(i+1); s.appendChild(o);
    });
    const idx=fileHeaders.findIndex(h=>guesses.some(g=>String(h).includes(g)));
    s.value=idx>=0?idx:'';
  };
  sel('col-name',['姓名','名字','name','Name','學生']);
  sel('col-class',['班級','班','class','Class','年級']);
}

function buildPreview(){
  const ni=document.getElementById('col-name').value;
  const ci=document.getElementById('col-class').value;
  const rows=parsedFileRows.slice(0,5);
  let html='<tr>';
  if(ni!=='') html+='<th>姓名</th>';
  if(ci!=='') html+='<th>班級</th>';
  html+='</tr>';
  rows.forEach(r=>{
    html+='<tr>';
    if(ni!=='') html+='<td>'+(r[ni]||'')+'</td>';
    if(ci!=='') html+='<td>'+(r[ci]||'')+'</td>';
    html+='</tr>';
  });
  document.getElementById('preview-table').innerHTML=html;
}

function doImport(){
  const replace=document.getElementById('chk-replace').checked;
  const activeTab=document.querySelector('.tab-panel.active').id;
  let newStudents=[];

  if(activeTab==='tab-file'){
    const ni=document.getElementById('col-name').value;
    const ci=document.getElementById('col-class').value;
    if(ni===''){alert('請選擇姓名欄位');return;}
    newStudents=parsedFileRows
      .map(r=>({name:String(r[ni]||'').trim(), cls:ci!==''?String(r[ci]||'').trim()||'未分班':'未分班'}))
      .filter(s=>s.name);
  } else {
    const lines=document.getElementById('paste-area').value.split(/\r?\n/).filter(l=>l.trim());
    newStudents=lines.map(l=>{
      const parts=l.split(/[,，\t]/);
      return {name:parts[0].trim(), cls:(parts[1]||'').trim()||'未分班'};
    }).filter(s=>s.name);
  }

  if(!newStudents.length){alert('沒有找到有效的學生資料');return;}

  if(replace){
    students=newStudents.map(s=>({id:nextId++,name:s.name,cls:s.cls,status:'none',note:''}));
  } else {
    const existing=new Set(students.map(s=>s.name));
    const added=newStudents.filter(s=>!existing.has(s.name));
    if(!added.length){alert('所有學生已存在名單中，無新增');return;}
    added.forEach(s=>students.push({id:nextId++,name:s.name,cls:s.cls,status:'none',note:''}));
    newStudents=added;
  }

  save(); updateStats(); render(); closeImport();
  alert('成功匯入 '+newStudents.length+' 位學生！');
}

setDateBadge(); updateStats(); render();
</script>
</body>
</html>
