<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>均均接送點名系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0;
    --text: #1a1a18; --text2: #6b6a66;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 12px;
  }
  body { font-family: -apple-system, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 600px; margin: 0 auto; background: var(--bg); min-height: 100vh; box-shadow: 0 0 0 0.5px var(--border); }
  .header { padding: 1.5rem 1.5rem 1rem; }
  .search-zone { padding: 0 1.5rem 1rem; position: relative; }
  #search-input { width: 100%; padding: 15px; font-size: 18px; border-radius: var(--radius); border: 1px solid var(--border2); }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding: 0 1.5rem 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px; text-align: center; font-size: 13px; }
  .toolbar { padding: 0 1.5rem 1.5rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border2); background: white; cursor: pointer; font-size: 14px; }
  .btn-add { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
  .btn-reset { color: #993C1D; font-weight: 600; margin-left: auto; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 18px 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .name-td { font-size: 22px; font-weight: 800; }
  .del-btn { color: #ccc; border: none; background: none; font-size: 18px; cursor: pointer; padding: 5px; margin-left: 8px; }
  .status-btns { display: flex; gap: 6px; }
  .sb { flex: 1; padding: 15px 0; border-radius: 10px; border: 1px solid var(--border); font-size: 15px; font-weight: bold; background: #fff; color: var(--text2); }
  .sb.active-present { background: #22c55e; color: white; border-color: #22c55e; }
  .sb.active-absent  { background: #ef4444; color: white; border-color: #ef4444; }
  .sb.active-leave   { background: #f59e0b; color: white; border-color: #f59e0b; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-content { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1 style="font-size: 24px;">均均接送點名</h1>
    <div id="date-badge" style="font-size: 14px; color: gray; margin-top: 4px;"></div>
  </div>

  <div class="search-zone">
    <input type="text" id="search-input" placeholder="搜尋姓名..." autofocus>
  </div>

  <div class="stats">
    <div class="stat"><div id="total-count" style="font-weight:bold">0</div><div>總數</div></div>
    <div class="stat"><div id="present-count" style="color:#22c55e; font-weight:bold">0</div><div>接到</div></div>
    <div class="stat"><div id="absent-count" style="color:#ef4444; font-weight:bold">0</div><div>缺席</div></div>
    <div class="stat"><div id="leave-count" style="color:#f59e0b; font-weight:bold">0</div><div>請假</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="add-name" placeholder="加人..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc;">
    <button class="btn btn-add" onclick="addStudent()">新增</button>
    <button class="btn" onclick="openImport()">匯入</button>
    <button class="btn btn-reset" onclick="resetToday()">重置狀態</button>
  </div>

  <table><tbody id="student-tbody"></tbody></table>
</div>

<div id="import-modal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:15px">匯入名單 (覆蓋模式)</h3>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(this)" style="margin-bottom:15px">
    <div id="col-select-area" style="display:none">
      <p style="font-size:13px; margin-bottom:5px">選擇「姓名」欄位：</p>
      <select id="col-name-sel" style="width:100%; padding:8px; margin-bottom:15px"></select>
      <button class="btn btn-add" style="width:100%" onclick="confirmImport()">確定覆蓋匯入</button>
    </div>
    <button class="btn" style="width:100%; margin-top:10px" onclick="closeImport()">取消</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCIJ9hrRWaD_s26eAZrpAUbpZbdrZ2fm0",
  authDomain: "ankinder-34783.firebaseapp.com",
  databaseURL: "https://ankinder-34783-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ankinder-34783",
  storageBucket: "ankinder-34783.firebasestorage.app",
  messagingSenderId: "287380680956",
  appId: "1:287380680956:web:45c6b822422db8a12fe779",
  measurementId: "G-W5TD1ZE6VH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const studentsRef = ref(db, 'students');

let students = {};
let searchQ = '';
let parsedRows = [];

onValue(studentsRef, (snapshot) => {
  students = snapshot.val() || {};
  updateStats(); render();
});

// 修正後的點名函式：再次點擊即可取消
window.setStatus = async (key, status) => {
  const currentStatus = students[key] ? students[key].status : 'none';
  const newStatus = (currentStatus === status) ? 'none' : status;
  await update(ref(db, 'students/' + key), { status: newStatus });
};

window.addStudent = () => {
  const n = document.getElementById('add-name').value.trim();
  if(n) { push(studentsRef, {name:n, status:'none'}); document.getElementById('add-name').value=''; }
};

window.deleteStudent = (k, n) => { if(confirm(`刪除 ${n}？`)) remove(ref(db, 'students/'+k)); };

window.resetToday = () => {
  if(!confirm('將所有狀態歸零？')) return;
  const ups = {}; Object.keys(students).forEach(k => ups['students/'+k+'/status']='none');
  update(ref(db), ups);
};

window.openImport = () => document.getElementById('import-modal').style.display='flex';
window.closeImport = () => document.getElementById('import-modal').style.display='none';

window.handleFile = (input) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    parsedRows = XLSX.utils.sheet_to_json(sheet, {header: 1});
    const headers = parsedRows[0];
    const sel = document.getElementById('col-name-sel');
    sel.innerHTML = headers.map((h, i) => `<option value="${i}">${h || '欄位'+(i+1)}</option>`).join('');
    document.getElementById('col-select-area').style.display = 'block';
  };
  reader.readAsArrayBuffer(input.files[0]);
};

window.confirmImport = async () => {
  if(!confirm('這會刪除舊名單並覆蓋，確定嗎？')) return;
  const colIdx = document.getElementById('col-name-sel').value;
  const newStudents = {};
  parsedRows.slice(1).forEach((row, i) => {
    const name = String(row[colIdx] || '').trim();
    if(name) newStudents['s_'+Date.now()+'_'+i] = { name, status: 'none' };
  });
  await set(ref(db, 'students'), newStudents);
  closeImport();
  alert('名單已更新！');
};

window.render = () => {
  const tbody = document.getElementById('student-tbody');
  let list = Object.entries(students).map(([k,v])=>({k,...v}));
  if(searchQ) list = list.filter(s => s.name.includes(searchQ));
  tbody.innerHTML = list.map(s => `
    <tr>
      <td class="name-td">${s.name}<button class="del-btn" onclick="deleteStudent('${s.k}','${s.name}')">✕</button></td>
      <td><div class="status-btns">
        <button class="sb ${s.status==='present'?'active-present':''}" onclick="setStatus('${s.k}','present')">接到</button>
        <button class="sb ${s.status==='absent'?'active-absent':''}" onclick="setStatus('${s.k}','absent')">缺席</button>
        <button class="sb ${s.status==='leave'?'active-leave':''}" onclick="setStatus('${s.k}','leave')">請假</button>
      </div></td>
    </tr>
  `).join('');
};

window.updateStats = () => {
  const v = Object.values(students);
  document.getElementById('total-count').textContent = v.length;
  document.getElementById('present-count').textContent = v.filter(x=>x.status==='present').length;
  document.getElementById('absent-count').textContent = v.filter(x=>x.status==='absent').length;
  document.getElementById('leave-count').textContent = v.filter(x=>x.status==='leave').length;
};

document.getElementById('search-input').oninput = (e) => { searchQ = e.target.value.trim(); render(); };
document.getElementById('date-badge').textContent = (new Date().getMonth()+1) + '/' + new Date().getDate() + ' 接送清單';
</script>
</body>
</html>
