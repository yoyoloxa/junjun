<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>均均接送點名系統</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0;
    --text: #1a1a18; --text2: #6b6a66;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #2a2a27;
      --text: #f0ede8; --text2: #a09e9a;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: -apple-system,'PingFang TC','Microsoft JhengHei',sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .app { max-width: 800px; margin: 0 auto; background: var(--bg); min-height: 100vh; box-shadow: 0 0 0 0.5px var(--border); }

  .header { padding: 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .title-block h1 { font-size: 22px; font-weight: 600; }
  .header-meta { display: flex; justify-content: space-between; align-items: center; }
  .date-badge { font-size: 14px; color: var(--text2); }
  .sync-badge { font-size: 12px; padding: 4px 10px; border-radius: 99px; background: #eee; }
  .sync-badge.online { background: #E1F5EE; color: #085041; }

  .search-zone { padding: 0 1.25rem 0.75rem; display: flex; gap: 6px; }
  .search-input-wrap { flex: 1; position: relative; }
  #search-input { width: 100%; padding: 14px; font-size: 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); }
  .clear-search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #ddd; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 0 1.25rem 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 8px; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 600; }
  .stat-label { font-size: 11px; color: var(--text2); }

  .toolbar { display: flex; align-items: center; gap: 6px; padding: 0 1.25rem 1rem; }
  .btn { border: 1px solid var(--border2); background: var(--bg); color: var(--text); border-radius: var(--radius); padding: 10px 14px; font-size: 14px; cursor: pointer; }
  .btn-add { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
  .btn-reset { color: #993C1D; font-weight: 600; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 13px; color: var(--text2); padding: 10px; text-align: left; border-bottom: 1px solid var(--border2); }
  td { padding: 16px 10px; border-bottom: 0.5px solid var(--border); }
  .name-td { font-size: 20px; font-weight: 800; color: var(--text); }

  .status-btns { display: flex; gap: 6px; }
  .sb { flex: 1; padding: 12px 0; border-radius: 8px; border: 1px solid var(--border); background: transparent; font-size: 14px; font-weight: 600; color: var(--text2); min-width: 60px; }
  .sb.active-present { background: #22c55e; color: white; border-color: #22c55e; }
  .sb.active-absent  { background: #ef4444; color: white; border-color: #ef4444; }
  .sb.active-leave   { background: #f59e0b; color: white; border-color: #f59e0b; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading"><div>⏳ 載入名單中...</div></div>

<div class="app">
  <div class="header">
    <div class="title-block"><h1>均均接送點名</h1></div>
    <div class="header-meta">
      <div class="date-badge" id="date-badge"></div>
      <div class="sync-badge" id="sync-badge">⏳ 同步中</div>
    </div>
  </div>

  <div class="search-zone">
    <div class="search-input-wrap">
      <input type="text" id="search-input" placeholder="搜尋學生姓名..." autofocus>
      <button class="clear-search-btn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">總數</div></div>
    <div class="stat"><div class="stat-num" style="color:#22c55e" id="present-count">0</div><div class="stat-label">已接到</div></div>
    <div class="stat"><div class="stat-num" style="color:#ef4444" id="absent-count">0</div><div class="stat-label">缺席</div></div>
    <div class="stat"><div class="stat-num" style="color:#f59e0b" id="leave-count">0</div><div class="stat-label">請假</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="add-name" placeholder="快速加人..." style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--border2); font-size:16px;">
    <button class="btn btn-add" onclick="addStudent()">新增</button>
    <button class="btn btn-reset" onclick="resetToday()">重置狀態</button>
  </div>

  <div style="padding: 0 5px 2rem;">
    <table>
      <thead>
        <tr>
          <th style="width:40%;">姓名</th>
          <th style="width:60%;">出席狀態</th>
        </tr>
      </thead>
      <tbody id="student-tbody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCIJ9hrRWaD_s26eAZrpAUbpZbdrZ2fm0",
  authDomain: "ankinder-34783.firebaseapp.com",
  databaseURL: "https://ankinder-34783-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ankinder-34783",
  storageBucket: "ankinder-34783.firebasestorage.app",
  messagingSenderId: "287380680956",
  appId: "1:287380680956:web:45c6b822422db8a12fe779",
  measurementId: "G-W5TD1ZE6VH"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const studentsRef = ref(db, 'students');

let students = {};
let searchQ = '';

onValue(studentsRef, (snapshot) => {
  students = snapshot.val() || {};
  document.getElementById('loading').style.display = 'none';
  const sb = document.getElementById('sync-badge');
  sb.className = 'sync-badge online';
  sb.textContent = '☁️ 已同步';
  updateStats(); render();
});

window.setStatus = async (key, status) => {
  await update(ref(db, 'students/' + key), { status });
};

window.addStudent = async () => {
  const el = document.getElementById('add-name');
  const name = el.value.trim();
  if (!name) return;
  await push(ref(db, 'students'), { name, status: 'none', note: '' });
  el.value = '';
};

window.resetToday = async () => {
  if (!confirm('確定要重置所有點名狀態嗎？')) return;
  const updates = {};
  Object.keys(students).forEach(key => {
    updates['students/' + key + '/status'] = 'none';
  });
  await update(ref(db), updates);
};

window.clearSearch = () => {
  const input = document.getElementById('search-input');
  input.value = '';
  searchQ = '';
  render();
  input.focus();
};

window.render = function() {
  const tbody = document.getElementById('student-tbody');
  let list = Object.entries(students).map(([k,v]) => ({key:k, ...v}));
  if (searchQ) list = list.filter(s => s.name.includes(searchQ));

  tbody.innerHTML = list.map(s => `
    <tr>
      <td class="name-td">${s.name}</td>
      <td>
        <div class="status-btns">
          <button class="sb ${s.status==='present'?'active-present':''}" onclick="setStatus('${s.key}','present')">接到</button>
          <button class="sb ${s.status==='absent'?'active-absent':''}" onclick="setStatus('${s.key}','absent')">缺席</button>
          <button class="sb ${s.status==='leave'?'active-leave':''}" onclick="setStatus('${s.key}','leave')">請假</button>
        </div>
      </td>
    </tr>
  `).join('');
};

window.updateStats = () => {
  const vals = Object.values(students);
  document.getElementById('total-count').textContent = vals.length;
  document.getElementById('present-count').textContent = vals.filter(v=>v.status==='present').length;
  document.getElementById('absent-count').textContent = vals.filter(v=>v.status==='absent').length;
  document.getElementById('leave-count').textContent = vals.filter(v=>v.status==='leave').length;
};

document.getElementById('search-input').addEventListener('input', (e) => {
  searchQ = e.target.value.trim();
  render();
});

const d = new Date();
document.getElementById('date-badge').textContent = `${d.getMonth()+1}/${d.getDate()} 點名表`;
</script>
</body>
</html>
